<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   xmlns:dc="http://purl.org/dc/elements/1.1/"
   xmlns:cc="http://creativecommons.org/ns#"
   xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
   xmlns:svg="http://www.w3.org/2000/svg"
   xmlns="http://www.w3.org/2000/svg"
   width="64px"
   height="64px"
   viewBox="0 0 64 64"
   version="1.1">
  <g>
    <!-- Solid Cube (Gray) -->
    <path
       style="fill:#a0a0a4;stroke:#2e3436;stroke-width:2px;stroke-linecap:butt;stroke-linejoin:round;stroke-opacity:1"
       d="M 16,16 48,16 48,48 16,48 Z" />
    <path
       style="fill:#d3d7cf;stroke:#2e3436;stroke-width:2px;stroke-linecap:butt;stroke-linejoin:round;stroke-opacity:1"
       d="M 16,16 28,4 60,4 48,16 Z" />
    <path
       style="fill:#888a85;stroke:#2e3436;stroke-width:2px;stroke-linecap:butt;stroke-linejoin:round;stroke-opacity:1"
       d="M 48,48 60,36 60,4 48,16 Z" />
       
    <!-- Sheet Metal Peel / Convert (Blue) -->
    <!-- Front Face turning into sheet -->
    <path
       style="fill:#729fcf;fill-opacity:0.6;stroke:#204a87;stroke-width:2px;stroke-linecap:butt;stroke-linejoin:round;stroke-opacity:1"
       d="M 16,48 16,16 48,16" />
    
    <!-- Arrow indicating transformation -->
    <path
       style="fill:#fce94f;stroke:#c4a000;stroke-width:2px;stroke-linecap:round;stroke-linejoin:round"
       d="M 10,40 C 6,55 20,60 25,55 L 22,50 M 25,55 L 20,58" />
       
    <!-- Sheet Metal Corner (emphasized) -->
    <path
       style="fill:none;stroke:#3465a4;stroke-width:4;stroke-linecap:round;stroke-linejoin:round"
       d="M 14,35 14,14 35,14" />
  </g>
</svg>
